name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test:
    name: Build, Test & Sample
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for Source Link and git-based versioning

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build (warnings-as-errors)
        run: dotnet build --no-restore --configuration Release

      - name: Unit tests (excludes live adapter tests)
        run: >
          dotnet test --no-build --configuration Release
          --filter "Category!=Live"
          --logger "trx;LogFileName=test-results.trx"
          --logger "console;verbosity=minimal"

      - name: Sample smoke test (zero external dependencies)
        run: dotnet run --project samples/RetriEval.Sample --configuration Release

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "**/*.trx"

      - name: Upload markdown report (from sample)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: retrieval-report
          path: "retrieval-report.md"

  pack:
    name: Pack NuGet packages
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Pack all publishable packages
        run: |
          for proj in \
            src/RetriEval.Core \
            src/RetriEval.Reporting \
            src/RetriEval.Testing.Xunit \
            src/RetriEval.Testing.NUnit \
            src/RetriEval.Embeddings.Abstractions \
            src/RetriEval.Llm.Abstractions \
            src/RetriEval.Adapters.AzureAISearch \
            src/RetriEval.Adapters.Qdrant \
            src/RetriEval.Observability \
            src/RetriEval.Cli; do
            dotnet pack "$proj" --configuration Release --no-build --output ./artifacts
          done

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            ./artifacts/*.nupkg
            ./artifacts/*.snupkg

  # Publish to NuGet.org — only on tagged releases
  publish:
    name: Publish to NuGet.org
    runs-on: ubuntu-latest
    needs: pack
    if: startsWith(github.ref, 'refs/tags/v')
    environment: nuget

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts

      - name: Push to NuGet.org
        run: >
          dotnet nuget push "./artifacts/*.nupkg"
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
